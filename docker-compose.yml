# LENITNES — full stack for Coolify (Docker Compose deployment).
#
# Services: postgres (db), redis, api, worker, web.
# Secrets and public URLs are supplied via Coolify environment variables.
# SERVICE_FQDN_* are Coolify "magic" vars that auto-generate domains + Traefik
# routing for the exposed services (api on :8742, web on :3000).

x-api-env: &api-env
  NODE_ENV: 'production'
  DATABASE_URL: 'postgresql://${POSTGRES_USER:***@db:5432/${POSTGRES_DB:-lenitnes}'
  PGSSLMODE: 'disable'
  REDIS_URL: 'redis://lenitnes-redis:6379'
  WEB_ORIGIN: ${WEB_ORIGIN}
  # ── Auth (zero-headcount — JWT_SECRET/ENCRYPTION_KEY kept for legacy endpoints) ──
  JWT_SECRET: ${JWT_SECRET}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  WEBHOOK_SECRET: ${WEBHOOK_SECRET}
  # ── Agent (Day 3) ──
  VIRTUALS_API_KEY: ${VIRTUALS_API_KEY}
  VIRTUALS_BASE_URL: ${VIRTUALS_BASE_URL:-https://compute.virtuals.io/v1}
  AGENT_MODEL: ${AGENT_MODEL:-moonshotai/kimi-k2-0905}
  MOCK_AGENT: ${MOCK_AGENT:-1}
  CONVICTION_THRESHOLD: ${CONVICTION_THRESHOLD:-70}
  DAILY_AGENT_BUDGET_USD: ${DAILY_AGENT_BUDGET_USD:-100}
  AGENT_INPUT_COST_PER_1M_USD: ${AGENT_INPUT_COST_PER_1M_USD:-0.60}
  AGENT_OUTPUT_COST_PER_1M_USD: ${AGENT_OUTPUT_COST_PER_1M_USD:-2.50}
  ADMIN_API_KEY: ${ADMIN_API_KEY}
  # ── Treasury (Day 5) ──
  TREASURY_PRIVATE_KEY: ${TREASURY_PRIVATE_KEY}
  TREASURY_MODE: ${TREASURY_MODE:-paper}
  TREASURY_DEFAULT_CHAIN: ${TREASURY_DEFAULT_CHAIN:-arbitrum}
  TREASURY_DEFAULT_AMOUNT: ${TREASURY_DEFAULT_AMOUNT:-0.01}
  TREASURY_SLIPPAGE_BPS: ${TREASURY_SLIPPAGE_BPS:-50}
  TREASURY_DEFAULT_TOKEN_IN: ${TREASURY_DEFAULT_TOKEN_IN}
  ARBITRUM_RPC_URL: ${ARBITRUM_RPC_URL:-https://sepolia-rollup.arbitrum.io/rpc}
  ROBINHOOD_RPC_URL: ${ROBINHOOD_RPC_URL:-https://rpc.testnet.chain.robinhood.com}
  ARB_SIGNAL_REGISTRY_ADDRESS: ${ARB_SIGNAL_REGISTRY_ADDRESS}
  ARB_TRADE_EXECUTOR_ADDRESS: ${ARB_TRADE_EXECUTOR_ADDRESS}
  RH_SIGNAL_REGISTRY_ADDRESS: ${RH_SIGNAL_REGISTRY_ADDRESS}
  RH_TRADE_EXECUTOR_ADDRESS: ${RH_TRADE_EXECUTOR_ADDRESS}
  ROBINHOOD_SWAP_ROUTER: ${ROBINHOOD_SWAP_ROUTER}
  # ── Notification ──
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
  TELEGRAM_PUBLIC_CHANNEL_ID: ${TELEGRAM_PUBLIC_CHANNEL_ID}
  # ── Detection (optional — demo seed doesn't use these) ──
  TINYFISH_API_KEY: ${TINYFISH_API_KEY}
  GITHUB_TOKEN: ${GITHUB_TOKEN}
  PROOF_MODE: ${PROOF_MODE:-hedera}

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lenitnes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lenitnes}
      POSTGRES_DB: ${POSTGRES_DB:-lenitnes}
    volumes:
      - lenitnes-db-data:/var/lib/postgresql/data
      # Applies db/schema.sql on first init (schema is idempotent / IF NOT EXISTS).
      - ./db/schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lenitnes} -d ${POSTGRES_DB:-lenitnes}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Explicit, unique name. Without this the service alias `redis` collides
    # with Coolify's own `coolify-redis` (also aliased `redis`) on the shared
    # external `coolify` network that api/worker join for Traefik routing —
    # causing REDIS_URL to resolve to Coolify's password-protected Redis
    # (NOAUTH errors, broken BullMQ queue).
    container_name: lenitnes-redis
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      <<: *api-env
      SERVICE_FQDN_API_8742: ${SERVICE_FQDN_API_8742}
      API_PORT: '8742'
    networks:
      - default
      - coolify
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - 'traefik.http.routers.lenitnes-api.rule=Host(`lenitnes.persidian.com`) && PathPrefix(`/api`)'
      - 'traefik.http.routers.lenitnes-api.priority=50'
      - 'traefik.http.routers.lenitnes-api.entrypoints=https'
      - 'traefik.http.routers.lenitnes-api.tls.certresolver=letsencrypt'
      - 'traefik.http.middlewares.lenitnes-api-stripprefix.stripprefix.prefixes=/api'
      - 'traefik.http.routers.lenitnes-api.middlewares=lenitnes-api-stripprefix'
      - 'traefik.http.services.lenitnes-api.loadbalancer.server.port=8742'
    ports:
      - '8742:8742'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8742/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.worker
    restart: unless-stopped
    environment:
      <<: *api-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
    restart: unless-stopped
    networks:
      - default
      - coolify
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - 'traefik.http.routers.lenitnes-web.rule=Host(`lenitnes.persidian.com`)'
      - 'traefik.http.routers.lenitnes-web.priority=50'
      - 'traefik.http.routers.lenitnes-web.entrypoints=https'
      - 'traefik.http.routers.lenitnes-web.tls.certresolver=letsencrypt'
      - 'traefik.http.services.lenitnes-web.loadbalancer.server.port=3000'
    ports:
      - '3000:3000'
    environment:
      - SERVICE_FQDN_WEB_3000
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - api

networks:
  coolify:
    external: true

volumes:
  lenitnes-db-data:
