# LENITNES — full stack for Coolify (Docker Compose deployment).
#
# Services: postgres (db), api, worker, web.
# Secrets and public URLs are supplied via Coolify environment variables.
# SERVICE_FQDN_* are Coolify "magic" vars that auto-generate domains + Traefik
# routing for the exposed services (api on :8742, web on :3000).

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lenitnes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lenitnes}
      POSTGRES_DB: ${POSTGRES_DB:-lenitnes}
    volumes:
      - lenitnes-db-data:/var/lib/postgresql/data
      # Applies db/schema.sql on first init (schema is idempotent / IF NOT EXISTS).
      - ./db/schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lenitnes} -d ${POSTGRES_DB:-lenitnes}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Explicit, unique name. Without this the service alias `redis` collides
    # with Coolify's own `coolify-redis` (also aliased `redis`) on the shared
    # external `coolify` network that api/worker join for Traefik routing —
    # causing REDIS_URL to resolve to Coolify's password-protected Redis
    # (NOAUTH errors, broken BullMQ queue).
    container_name: lenitnes-redis
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_API_8742
      - NODE_ENV=production
      - API_PORT=8742
      - DATABASE_URL=postgresql://${POSTGRES_USER:-lenitnes}:${POSTGRES_PASSWORD:-lenitnes}@db:5432/${POSTGRES_DB:-lenitnes}
      - PGSSLMODE=disable
      - REDIS_URL=redis://lenitnes-redis:6379
      - WEB_ORIGIN=${WEB_ORIGIN}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - HEDERA_NETWORK=${HEDERA_NETWORK:-testnet}
      - HEDERA_OPERATOR_ID=${HEDERA_OPERATOR_ID}
      - HEDERA_OPERATOR_KEY=${HEDERA_OPERATOR_KEY}
      - HEDERA_TREASURY_ID=${HEDERA_TREASURY_ID}
      - HEDERA_HCS_TOPIC_ID=${HEDERA_HCS_TOPIC_ID}
      - DEFAULT_COST_PER_CHECK_HBAR=${DEFAULT_COST_PER_CHECK_HBAR:-0.5}
      - TINYFISH_API_KEY=${TINYFISH_API_KEY}
      - GROVE_CHAIN_ID=${GROVE_CHAIN_ID:-37111}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SMTP_URL=${SMTP_URL}
      - X402_FACILITATOR_URL=${X402_FACILITATOR_URL:-https://blocky402.com}
      - X402_HEDERA_NETWORK=${X402_HEDERA_NETWORK:-hedera:testnet}
      - X402_PAY_TO=${X402_PAY_TO}
      - X402_PRICE_HBAR=${X402_PRICE_HBAR:-0.5}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - PROOF_MODE=${PROOF_MODE:-hedera}
      - TRADE_COOLDOWN_MINUTES=${TRADE_COOLDOWN_MINUTES:-15}
      - KRAKEN_CANCEL_AFTER_SECONDS=${KRAKEN_CANCEL_AFTER_SECONDS:-300}
      - MAX_OPEN_ORDERS=${MAX_OPEN_ORDERS:-10}
    networks:
      - default
      - coolify
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - 'traefik.http.routers.lenitnes-api.rule=Host(`lenitnes.persidian.com`) && PathPrefix(`/api`)'
      - 'traefik.http.routers.lenitnes-api.priority=100'
      - 'traefik.http.routers.lenitnes-api.entrypoints=https'
      - 'traefik.http.routers.lenitnes-api.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.lenitnes-api.middlewares=lenitnes-api-stripprefix'
      - 'traefik.http.middlewares.lenitnes-api-stripprefix.stripprefix.prefixes=/api'
      - 'traefik.http.services.lenitnes-api.loadbalancer.server.port=8742'
    ports:
      - '8742:8742'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8742/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-lenitnes}:${POSTGRES_PASSWORD:-lenitnes}@db:5432/${POSTGRES_DB:-lenitnes}
      - PGSSLMODE=disable
      - REDIS_URL=redis://lenitnes-redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - HEDERA_NETWORK=${HEDERA_NETWORK:-testnet}
      - HEDERA_OPERATOR_ID=${HEDERA_OPERATOR_ID}
      - HEDERA_OPERATOR_KEY=${HEDERA_OPERATOR_KEY}
      - HEDERA_TREASURY_ID=${HEDERA_TREASURY_ID}
      - HEDERA_HCS_TOPIC_ID=${HEDERA_HCS_TOPIC_ID}
      - DEFAULT_COST_PER_CHECK_HBAR=${DEFAULT_COST_PER_CHECK_HBAR:-0.5}
      - TINYFISH_API_KEY=${TINYFISH_API_KEY}
      - GROVE_CHAIN_ID=${GROVE_CHAIN_ID:-37111}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SMTP_URL=${SMTP_URL}
      - X402_FACILITATOR_URL=${X402_FACILITATOR_URL:-https://blocky402.com}
      - X402_HEDERA_NETWORK=${X402_HEDERA_NETWORK:-hedera:testnet}
      - X402_PAY_TO=${X402_PAY_TO}
      - X402_PRICE_HBAR=${X402_PRICE_HBAR:-0.5}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - PROOF_MODE=${PROOF_MODE:-hedera}
      - TRADE_COOLDOWN_MINUTES=${TRADE_COOLDOWN_MINUTES:-15}
      - KRAKEN_CANCEL_AFTER_SECONDS=${KRAKEN_CANCEL_AFTER_SECONDS:-300}
      - MAX_OPEN_ORDERS=${MAX_OPEN_ORDERS:-10}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
        - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
        - NEXT_PUBLIC_HEDERA_NETWORK=${NEXT_PUBLIC_HEDERA_NETWORK:-testnet}
    restart: unless-stopped
    networks:
      - default
      - coolify
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - 'traefik.http.routers.lenitnes-web.rule=Host(`lenitnes.persidian.com`)'
      - 'traefik.http.routers.lenitnes-web.priority=50'
      - 'traefik.http.routers.lenitnes-web.entrypoints=https'
      - 'traefik.http.routers.lenitnes-web.tls.certresolver=letsencrypt'
      - 'traefik.http.services.lenitnes-web.loadbalancer.server.port=3000'
    ports:
      - '3000:3000'
    environment:
      - SERVICE_FQDN_WEB_3000
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - api

networks:
  coolify:
    external: true

volumes:
  lenitnes-db-data:
