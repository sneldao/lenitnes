# LENITNES — full stack for Coolify (Docker Compose deployment).
#
# Services: postgres (db), redis, api, worker, web.
# Secrets and public URLs are supplied via Coolify environment variables.
# SERVICE_FQDN_* are Coolify "magic" vars that auto-generate domains + Traefik
# routing for the exposed services (api on :8742, web on :3000).

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lenitnes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lenitnes}
      POSTGRES_DB: ${POSTGRES_DB:-lenitnes}
    volumes:
      - lenitnes-db-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lenitnes} -d ${POSTGRES_DB:-lenitnes}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lenitnes-redis
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_FQDN_API_8742: ${SERVICE_FQDN_API_8742:-}
      API_PORT: '8742'
      NODE_ENV: production
      # DATABASE_URL is built at runtime by config.ts from POSTGRES_*
      # (see apps/api/src/config.ts → databaseUrlFromPgVars). The
      # .env file on the host may have DATABASE_URL set (for the
      # host's local dev), but the container's POSTGRES_HOST=db
      # wins because the api code prefers the POSTGRES_* build.
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      POSTGRES_DB: ${POSTGRES_DB:-lenitnes}
      POSTGRES_USER: ${POSTGRES_USER:-lenitnes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: lenitnes-redis
      REDIS_PORT: '6379'
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      VIRTUALS_API_KEY: ${VIRTUALS_API_KEY:-}
      VIRTUALS_BASE_URL: ${VIRTUALS_BASE_URL:-https://compute.virtuals.io/v1}
      AGENT_MODEL: ${AGENT_MODEL:-moonshotai/kimi-k2-0905}
      MOCK_AGENT: ${MOCK_AGENT:-1}
      CONVICTION_THRESHOLD: ${CONVICTION_THRESHOLD:-70}
      DAILY_AGENT_BUDGET_USD: ${DAILY_AGENT_BUDGET_USD:-100}
      AGENT_INPUT_COST_PER_1M_USD: ${AGENT_INPUT_COST_PER_1M_USD:-0.60}
      AGENT_OUTPUT_COST_PER_1M_USD: ${AGENT_OUTPUT_COST_PER_1M_USD:-2.50}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      TREASURY_PRIVATE_KEY: ${TREASURY_PRIVATE_KEY}
      TREASURY_MODE: ${TREASURY_MODE:-paper}
      TREASURY_DEFAULT_CHAIN: ${TREASURY_DEFAULT_CHAIN:-arbitrum}
      TREASURY_DEFAULT_AMOUNT: ${TREASURY_DEFAULT_AMOUNT:-0.01}
      TREASURY_SLIPPAGE_BPS: ${TREASURY_SLIPPAGE_BPS:-50}
      TREASURY_DEFAULT_TOKEN_IN: ${TREASURY_DEFAULT_TOKEN_IN:-0xUSDC_PLACEHOLDER}
      ARBITRUM_RPC_URL: ${ARBITRUM_RPC_URL:-https://sepolia-rollup.arbitrum.io/rpc}
      ARB_SIGNAL_REGISTRY_ADDRESS: ${ARB_SIGNAL_REGISTRY_ADDRESS:-}
      ARB_TRADE_EXECUTOR_ADDRESS: ${ARB_TRADE_EXECUTOR_ADDRESS:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_PUBLIC_CHANNEL_ID: ${TELEGRAM_PUBLIC_CHANNEL_ID:-}
      TINYFISH_API_KEY: ${TINYFISH_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      PROOF_MODE: ${PROOF_MODE:-hedera}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      VIRTUALS_API_KEY: ${VIRTUALS_API_KEY:-}
      MOCK_AGENT: ${MOCK_AGENT:-1}
      CONVICTION_THRESHOLD: ${CONVICTION_THRESHOLD:-70}
      DAILY_AGENT_BUDGET_USD: ${DAILY_AGENT_BUDGET_USD:-100}
      TREASURY_PRIVATE_KEY: ${TREASURY_PRIVATE_KEY}
      TREASURY_MODE: ${TREASURY_MODE:-paper}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TINYFISH_API_KEY: ${TINYFISH_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      PROOF_MODE: ${PROOF_MODE:-hedera}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
    restart: unless-stopped
    networks:
      - default
      - coolify
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - 'traefik.http.routers.lenitnes-web.rule=Host(`lenitnes.persidian.com`)'
      - 'traefik.http.routers.lenitnes-web.priority=50'
      - 'traefik.http.routers.lenitnes-web.entrypoints=https'
      - 'traefik.http.routers.lenitnes-web.tls.certresolver=letsencrypt'
      - 'traefik.http.services.lenitnes-web.loadbalancer.server.port=3000'
    ports:
      - '3000:3000'
    environment:
      - SERVICE_FQDN_WEB_3000
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - api

networks:
  coolify:
    external: true

volumes:
  lenitnes-db-data:
